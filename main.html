<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beni affetsene</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 30px; }
        .btn-container {
            display: flex;
            align-items: center;
            gap: 20px;
            height: 200px;
        }
        #yesBtn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        #noBtn {
            background-color: #f44336;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
    </style>
</head>
<body>

    <h1 id="question">Beni affetsene</h1>

    <div class="btn-container">
        <button id="yesBtn">Tamam</button>
        <button id="noBtn">Hayır</button>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const question = document.getElementById('question');

        let clickCount = 0;
        const messages = [
            "emin misin",
            "bir daha dusun",
            "hadi hadi",
            "tiklayamayana kadar burdayiz",
            "hic mi yok",
            "bi anliga anlasiriz",
            "bunu da reddettiysen yandik",
            "nooluurr"
        ];

        let yesSize = 18;
        let noSize = 18;

        noBtn.addEventListener('click', () => {
            clickCount++;
            
            //yesil buyudu
            yesSize += 10;
            yesBtn.style.fontSize = yesSize + 'px';
            yesBtn.style.padding = (yesSize / 1.2) + 'px ' + (yesSize * 1.5) + 'px';

            //kirmizi kuculdu
            noSize = Math.max(noSize - 2, 5); 
            noBtn.style.fontSize = noSize + 'px';
            noBtn.style.padding = (noSize / 2) + 'px ' + (noSize) + 'px';

            // yazi degis
            if (clickCount <= messages.length) {
                yesBtn.innerText = messages[clickCount - 1];
            } else {
                yesBtn.innerText = "baska sansin yok artik";
                noBtn.style.display = "none"; // kirmizi buton nanay
            }
        });

        yesBtn.addEventListener('click', () => {
            question.innerText = "🥳🥳🥳";
            document.querySelector('.btn-container').innerHTML = "<h2 style='color: #4CAF50;'>sonunda be</h2>";
        });
    </script>
</body>
</html>
